<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আই এম সরি - আতাউর</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="mainCard">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpndmZ4bm5mZ3R4bm5mZ3R4bm5mZ3R4bm5mZ3R4bm5mZ3RmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PXM/3o7TKuylOmYpYnUvLq/giphy.gif" alt="Panda Sorry">
        </div>
        
        <h1>আমি সত্যিই অনেক দুঃখিত! 🥺</h1>
        
        <div class="counter-box">
            <p>আমরা একসাথে আছি:</p>
            <div id="timer">হিসাব করা হচ্ছে...</div>
        </div>

        <div class="letter-box">
            <button id="openLetter">আমার মনের কথাগুলো শোনো 💌</button>
            <p id="typewriterText" class="typewriter"></p>
        </div>

        <p class="question">তুমি কি আমাকে ক্ষমা করবে?</p>
        
        <div class="btn-group">
            <button id="yesBtn">হ্যাঁ, করলাম ❤️</button>
            <button id="noBtn">উঁহু, কখনোই না! ❌</button>
        </div>
    </div>

    <div class="container hidden" id="successMessage">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpndmZ4bm5mZ3R4bm5mZ3R4bm5mZ3R4bm5mZ3R4bm5mZ3RmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PXM/l41lTfO7hNl9VwLyo/giphy.gif" alt="Happy Dance">
        </div>
        <h2>ইউ আর দ্য বেস্ট! 😍</h2>
        <p>আমি জানতাম তুমি আমাকে অনেক ভালোবাসো। চলো আজ ফুচকা খেতে যাই!</p>
        <p class="footer-sign">Made by ATAUR</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
